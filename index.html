<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.9.2-caf2/shaka-player.compiled.js"></script>
  <style>
    body { margin: 0; background: #111; color: #eee; font-family: sans-serif; }
    #overlay { position: fixed; left: 0; top: 0; right: 0; padding: 8px 10px; background: rgba(0,0,0,.6); font-size: 12px; }
    #audio_element { width: 100%; }
  </style>
</head>

<body>
  <div id="overlay">RX booting...</div>
  <audio id="audio_element" controls></audio>

  <script>
    const overlay = document.getElementById('overlay');
    const audio = document.getElementById('audio_element');

    function log(...args) {
      console.log('[RX]', ...args);
      // 오버레이에 상태를 실시간으로 찍어 디버깅하기 쉽게 둡니다.
      overlay.textContent = args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
    }

    window.addEventListener('error', (e) => console.error('[RX] window.error', e.message, e.error));
    window.addEventListener('unhandledrejection', (e) => console.error('[RX] unhandledrejection', e.reason));

    if (!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()) {
      throw new Error('Shaka not supported');
    }
    if (shaka.polyfill && shaka.polyfill.installAll) shaka.polyfill.installAll();

    const player = new shaka.Player();
    player.attach(audio);

    player.addEventListener('error', (e) => {
      console.error('[RX] player.error', e?.detail);
      log('player.error', e?.detail?.code);
    });

    // ====== 목표 지연 시간 0.5초 (하드웨어 2.5초와 합쳐져 총 3초가 되도록 유도) ======
// ====== 항상 동일한 위치, 동일한 지연을 위한 고정 설정 ======
    const FIXED_SOFTWARE_DELAY = 2.0;

    player.configure({
      streaming: {
        lowLatencyMode: false, // 불완전한 최신 청크 요청을 방지하여 안정적인 시작 유도
        jumpLargeGaps: true,

        // 정확히 2.0초 분량의 청크가 버퍼에 수신되어야만 재생을 시작함 (스피커 상관없이 일관성 확보)
        bufferingGoal: FIXED_SOFTWARE_DELAY,
        rebufferingGoal: FIXED_SOFTWARE_DELAY,
        bufferBehind: 2.0, 

        liveSync: {
          enabled: true,
          targetLatency: FIXED_SOFTWARE_DELAY,
          targetLatencyTolerance: 0.2, // 0.2초 이상 틀어지면 즉시 배속을 조절해 2.0초 간격으로 강제 복귀
          maxPlaybackRate: 1.15,       
          minPlaybackRate: 0.95,
          panicMode: true,
          panicThreshold: 1.0          
        },

        retryParameters: {
          timeout: 10000,
          maxAttempts: 6,
          baseDelay: 300,
          backoffFactor: 2,
          fuzzFactor: 0.5
        }
      },

      manifest: {
        dash: {
          autoCorrectDrift: true,
          enableFastSwitching: true,
          ignoreSuggestedPresentationDelay: false, // MPD와 무관하게 아래 설정된 시작점을 강제함
          defaultPresentationDelay: FIXED_SOFTWARE_DELAY // 중요: 항상 Live Edge 기준 정확히 -2.0초 지점의 청크부터 다운로드 시작
        }
      }
    });

    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      async (loadRequestData) => {
        try {
          const url = loadRequestData?.media?.contentId;
          log('LOAD', url);
          await player.load(url);
          log('load.ok');
          try { await audio.play(); } catch (e) { console.warn('[RX] play blocked', e); }
          return loadRequestData;
        } catch (e) {
          log('LOAD failed', String(e));
          throw e;
        }
      }
    );

    setInterval(() => {
      try {
        const s = player.getStats();
        const ct = audio.currentTime;
        const be = (audio.buffered && audio.buffered.length) ? audio.buffered.end(audio.buffered.length - 1) : null;
        const bufAhead = (be != null && ct != null) ? (be - ct) : null;
        
        // 화면 좌측 상단에서 LiveLat이 0.5 근처로 유지되는지 확인하세요.
        log(`LiveLat: ${s.liveLatency?.toFixed(2)}s | Buf: ${bufAhead?.toFixed(2)}s`);
      } catch (e) {}
    }, 1000);

    context.start();
    log('Receiver started. waiting LOAD...');
  </script>
</body>
</html>
