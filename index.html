<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <!-- CAF Receiver Framework -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <!-- Shaka CAF2 build -->
  <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.9.2-caf2/shaka-player.compiled.js"></script>

  <style>
    body { margin: 0; background: #111; color: #eee; font-family: sans-serif; }
    #overlay { position: fixed; left: 0; top: 0; right: 0; padding: 8px 10px; background: rgba(0,0,0,.6); font-size: 12px; }
    #audio_element { width: 100%; }
  </style>
</head>

<body>
  <div id="overlay">RX booting...</div>
  <audio id="audio_element" controls></audio>

  <script>
    const overlay = document.getElementById('overlay');
    const audio = document.getElementById('audio_element');

    function log(...args) {
      console.log('[RX]', ...args);
      overlay.textContent = args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
    }

    // --- 전역 에러 방어(필수) ---
    window.addEventListener('error', (e) => console.error('[RX] window.error', e.message, e.error));
    window.addEventListener('unhandledrejection', (e) => console.error('[RX] unhandledrejection', e.reason));

    // --- Shaka 지원 확인 ---
    if (!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()) {
      log('Shaka not supported / not loaded');
      throw new Error('Shaka not supported');
    }
    if (shaka.polyfill && shaka.polyfill.installAll) shaka.polyfill.installAll();

    // --- Shaka Player 생성/attach ---
    const player = new shaka.Player();
    player.attach(audio);

    player.addEventListener('error', (e) => {
      const d = e?.detail ?? {};
      console.error('[RX] player.error', d);
      log('player.error', { code: d.code, cat: d.category, sev: d.severity, data: d.data });
    });

    // ====== 여기서 “딜레이 고정” 정책을 잡는다 (4초) ======
    const TARGET_LATENCY_SEC = 4.0;

    player.configure({
      streaming: {
        lowLatencyMode: true,
        jumpLargeGaps: true,

        liveSync: {
          enabled: true,
          targetLatency: TARGET_LATENCY_SEC,
          targetLatencyTolerance: 0.25,
          maxPlaybackRate: 1.10,
          minPlaybackRate: 0.95,
          panicMode: true,
          panicThreshold: 1.0,
        },

        // “시작/유지 버퍼”를 4초로 (일정한 딜레이 목적)
        bufferingGoal: TARGET_LATENCY_SEC,
        rebufferingGoal: TARGET_LATENCY_SEC,

        // 네트워크 흔들림 내성(끊김 방지)
        retryParameters: {
          timeout: 10000,
          maxAttempts: 6,
          baseDelay: 300,
          backoffFactor: 2,
          fuzzFactor: 0.5
        }
      },

      manifest: {
        dash: {
          autoCorrectDrift: true,
          enableFastSwitching: true,
          ignoreSuggestedPresentationDelay: true,
          ignoreMinBufferTime: true,
        }
      }
    });

    // --- CAF 초기화 ---
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // LOAD 요청 가로채서 URL 확인 + Shaka로 로드
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      async (loadRequestData) => {
        try {
          const url = loadRequestData?.media?.contentId;
          log('LOAD', url);

          // Shaka로 로드
          await player.load(url);
          log('load.ok', url);

          // autoplay 시도 (막혀도 죽지 않게)
          try { await audio.play(); }
          catch (e) { console.warn('[RX] audio.play blocked', e); }

          return loadRequestData; // CAF 계속 진행
        } catch (e) {
          console.error('[RX] LOAD failed', e);
          log('LOAD failed', String(e));
          throw e; // CAF에 실패 전달(여기서 원인 코드가 남음)
        }
      }
    );

    // 상태 변화 로그(끊김 원인 추적)
    playerManager.addEventListener(cast.framework.events.EventType.ERROR, (e) => {
      console.error('[RX] CAF ERROR', e);
      log('CAF.ERROR', e?.detailedErrorCode ?? '');
    });

    // 1초마다 지표(딜레이 유지 확인)
    setInterval(() => {
      try {
        const s = player.getStats();
        const ct = audio.currentTime;
        const be = (audio.buffered && audio.buffered.length) ? audio.buffered.end(audio.buffered.length - 1) : null;
        const bufAhead = (be != null && ct != null) ? (be - ct) : null;

        console.log('[RX] STATS', {
          liveLatency: s.liveLatency,
          bufferAhead: bufAhead,
          readyState: audio.readyState,
        });
      } catch (e) {
        console.warn('[RX] stats fail', e);
      }
    }, 1000);

    context.start();
    log('Receiver started. waiting LOAD...');
  </script>
</body>
</html>
