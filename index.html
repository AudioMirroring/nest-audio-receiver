<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
</head>

<body>
  <audio id="audio_element" autoplay></audio>

  <script>
    // =========================
    // Helpers
    // =========================
    const nowMs = () => (typeof performance !== 'undefined' ? performance.now() : Date.now());

    function safeJson(obj) {
      try { return JSON.stringify(obj); } catch (e) { return String(obj); }
    }

    function getBufferedEnd(mediaEl) {
      try {
        if (!mediaEl || !mediaEl.buffered || mediaEl.buffered.length === 0) return null;
        return mediaEl.buffered.end(mediaEl.buffered.length - 1);
      } catch (_) { return null; }
    }

    function log(...args) {
      // Nest Mini Remote Debugger/Console에서 확인 가능
      console.log('[RX]', ...args);
      // (옵션) 폰으로 로그 전송하고 싶으면 아래 sendLogToPhone() 호출도 같이 쓰세요.
    }

    // =========================
    // (Optional) send logs to phone
    // =========================
    // 1) 폰 서버에 /log 같은 엔드포인트를 만든 뒤
    // 2) 아래 URL을 폰 IP/포트로 맞추고 enabled = true로 바꾸면
    //    Nest Mini에서 찍힌 로그를 폰으로 전송할 수 있어요.
    const LOG_POST = {
      enabled: false,
      url: 'http://192.168.50.72:8080/log', // TODO: phone ip:port/log 로 변경
    };

    async function sendLogToPhone(payload) {
      if (!LOG_POST.enabled) return;
      try {
        await fetch(LOG_POST.url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          // keepalive는 일부 환경에서만 동작
        });
      } catch (e) {
        // 네트워크 실패는 무시(로그 루프가 멈추지 않게)
      }
    }

    function logAndSend(tag, payload) {
      log(tag, payload);
      sendLogToPhone({ t: Date.now(), tag, payload });
    }

    // =========================
    // Global error hooks
    // =========================
    window.onerror = function (msg, src, line, col, err) {
      logAndSend('window.onerror', { msg, src, line, col, err: String(err) });
    };
    window.onunhandledrejection = function (e) {
      logAndSend('unhandledrejection', { reason: String(e.reason) });
    };

    // =========================
    // Shaka init
    // =========================
    const audio = document.getElementById('audio_element');

    // Shaka internal logging level
    if (shaka && shaka.log) {
      shaka.log.setLevel(shaka.log.Level.DEBUG);
    }

    const player = new shaka.Player(audio);

    // Log player events
    player.addEventListener('error', (e) => {
      const detail = e && e.detail ? e.detail : {};
      logAndSend('player.error', {
        code: detail.code,
        severity: detail.severity,
        category: detail.category,
        data: detail.data,
        message: detail.message,
        stack: detail.stack,
      });
    });

    player.addEventListener('buffering', (e) => {
      logAndSend('player.buffering', { buffering: e.buffering });
    });

    player.addEventListener('loading', () => logAndSend('player.loading', {}));
    player.addEventListener('unloading', () => logAndSend('player.unloading', {}));
    player.addEventListener('trackschanged', () => logAndSend('player.trackschanged', {}));
    player.addEventListener('adaptation', () => logAndSend('player.adaptation', {}));
    player.addEventListener('variantchanged', () => logAndSend('player.variantchanged', {}));
    player.addEventListener('timeline', () => logAndSend('player.timeline', {}));

    // =========================
    // Configure (your fixed-latency target)
    // =========================
	player.configure({
	  streaming: {
		lowLatencyMode: true,
		jumpLargeGaps: true,

		// 딜레이를 이 값 근처로 끌어당김
		liveSync: {
		  enabled: true,
		  targetLatency: 0.5,              // 0.5~1.0 사이에서 보통 시작
		  targetLatencyTolerance: 0.5,
		  maxPlaybackRate: 1.1,
		  minPlaybackRate: 0.95,
		},

		// "내가 얼마를 버퍼로 쌓고 시작할지"에 큰 영향
		bufferingGoal: 1.0,                // 0.8~1.5 범위에서 튜닝
		rebufferingGoal: 0.5               // 0.3~1.0 범위에서 튜닝
	  },

	  manifest: {
		dash: {
		  autoCorrectDrift: true,
		  enableFastSwitching: true,

		  // MPD에 큰 SPD가 있으면, 이걸 무시해야 targetLatency가 먹습니다.
		  ignoreSuggestedPresentationDelay: true,

		  // minBufferTime이 크면 저지연이 무력화되기도 해서 실험 가치 큼
		  ignoreMinBufferTime: true
		}
	  }
	});

    // Confirm configuration is applied
    try {
      const cfg = player.getConfiguration();
      logAndSend('player.getConfiguration.streaming', cfg ? cfg.streaming : null);
    } catch (e) {
      logAndSend('player.getConfiguration.failed', { err: String(e) });
    }

	// =========================
	// PC 단독 테스트 모드 (Cast 없이 Shaka만 검증)
	// =========================
	const TEST = {
	  enabled: true, // PC에서만 켜고, Nest Mini 배포 시 false
	  url: 'http://192.168.0.65:8080/dash/index.mpd' // ← 여기만 본인 MPD로
	};

	if (TEST.enabled) {
	  const start = nowMs();
	  player.load(TEST.url).then(() => {
		logAndSend('player.load.ok(TEST)', { url: TEST.url, elapsedMs: Math.round(nowMs() - start) });
	  }).catch((error) => {
		logAndSend('player.load.fail(TEST)', { url: TEST.url, error: safeJson(error), elapsedMs: Math.round(nowMs() - start) });
	  });
	}
    // =========================
    // Cast receiver (CAF)
    // =========================
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // LOAD interceptor
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        const url = loadRequestData?.media?.contentId;
        const start = nowMs();

        logAndSend('LOAD.intercept', {
          url,
          contentType: loadRequestData?.media?.contentType,
          streamType: loadRequestData?.media?.streamType,
        });

        if (!url) {
          logAndSend('LOAD.no_url', { loadRequestData });
          return null;
        }

        // 실제 Shaka load 수행
        player.load(url).then(() => {
          const end = nowMs();
          logAndSend('player.load.ok', {
            url,
            elapsedMs: Math.round(end - start),
          });
        }).catch((error) => {
          logAndSend('player.load.fail', {
            url,
            error: safeJson(error),
            elapsedMs: Math.round(nowMs() - start),
          });
        });

        // CAF 기본 재생 로직 비활성화
        return null;
      }
    );

    // =========================
    // Periodic stats
    // =========================
    setInterval(() => {
	  try {
		const s = player.getStats();

		const ct = audio.currentTime;
		const be = getBufferedEnd(audio);

		const bufAhead = (be != null && ct != null) ? (be - ct) : null;

		// ===== live latency 계산 =====
		let liveLatency = null;

		try {
		  if (audio.seekable && audio.seekable.length > 0) {
			const liveEdge = audio.seekable.end(audio.seekable.length - 1);
			liveLatency = liveEdge - audio.currentTime;
		  }
		} catch (e) {}

		logAndSend('STATS', {

		  currentTime: ct,
		  bufferedEnd: be,
		  bufferAheadSec: bufAhead,
		  readyState: audio.readyState,

		  // 우리가 직접 계산한 live latency
		  liveLatencyCalculated: liveLatency,

		  // shaka stats
		  playTime: s.playTime,
		  bufferingTime: s.bufferingTime,

		  // shaka 내부 latency (있을 수도 있음)
		  liveLatencyShaka: s.liveLatency,

		  estimatedBandwidth: s.estimatedBandwidth
		});

	  } catch (e) {
		logAndSend('STATS.failed', { err: String(e) });
	  }

	}, 1000);
    // Start receiver
    context.start();
    logAndSend('context.start', {});
  </script>
</body>
</html>
