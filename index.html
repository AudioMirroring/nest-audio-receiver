<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.9.2-caf2/shaka-player.compiled.js"></script>
  <style>
    body { margin: 0; background: #111; color: #eee; font-family: sans-serif; }
    #overlay { position: fixed; left: 0; top: 0; right: 0; padding: 8px 10px; background: rgba(0,0,0,.6); font-size: 12px; }
    #audio_element { width: 100%; }
  </style>
</head>
<body>
  <div id="overlay">RX booting...</div>
  <audio id="audio_element" controls></audio>

<script>
  const overlay = document.getElementById('overlay');
  const audio = document.getElementById('audio_element');

  const TELEMETRY_NS = 'urn:x-cast:com.example.audiomirroring.telemetry';
  const CONTROL_NS = 'urn:x-cast:com.example.audiomirroring.control';

  function log(...args) {
    console.log('[RX]', ...args);
    overlay.textContent = args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
  }

  if (!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()) throw new Error('Shaka not supported');
  if (shaka.polyfill && shaka.polyfill.installAll) shaka.polyfill.installAll();

  const player = new shaka.Player();
  player.attach(audio);

  const TARGET_LATENCY_SEC = 4.0;
  const BUFFERING_GOAL_SEC = 3.0;

  player.configure({
    streaming: {
      lowLatencyMode: false,
      jumpLargeGaps: true,
      bufferingGoal: BUFFERING_GOAL_SEC,
      rebufferingGoal: BUFFERING_GOAL_SEC,
      bufferBehind: 2.0,
      liveSync: {
        enabled: true,
        targetLatency: TARGET_LATENCY_SEC,
        targetLatencyTolerance: 0.2,
        maxPlaybackRate: 1.15,
        minPlaybackRate: 0.95,
        panicMode: true,
        panicThreshold: 1.5
      }
    },
    manifest: {
      dash: {
        autoCorrectDrift: true,
        enableFastSwitching: true,
        ignoreSuggestedPresentationDelay: false,
        defaultPresentationDelay: TARGET_LATENCY_SEC
      }
    }
  });

  const context = cast.framework.CastReceiverContext.getInstance();
  const playerManager = context.getPlayerManager();

  function buildTelemetry() {
    const s = player.getStats ? player.getStats() : {};
    const ct = Number(audio.currentTime || 0);
    const be = (audio.buffered && audio.buffered.length)
      ? Number(audio.buffered.end(audio.buffered.length - 1))
      : ct;
    const bufAhead = Math.max(0, be - ct);

    return {
      playbackPositionSec: ct,
      liveLatencySec: Number(typeof s.liveLatency === 'number' ? s.liveLatency : 0),
      bufferAheadSec: bufAhead,
      receiverWallClockMs: Date.now()
    };
  }

  function sendTelemetry() {
    try {
      const telemetry = buildTelemetry();
      context.sendCustomMessage(
        TELEMETRY_NS,
        undefined,
        JSON.stringify(telemetry)
      );
      log(`TX LiveLat:${telemetry.liveLatencySec.toFixed(2)}s Buf:${telemetry.bufferAheadSec.toFixed(2)}s Pos:${telemetry.playbackPositionSec.toFixed(2)}s`);
    } catch (e) {
      console.error('[RX] telemetry send error', e);
      log('telemetry.error', String(e));
    }
  }

  playerManager.setMessageInterceptor(
    cast.framework.messages.MessageType.LOAD,
    async (loadRequestData) => {
      try {
        const url = loadRequestData?.media?.contentId;
        log('LOAD', url);
        await player.load(url);
        log('load.ok');
        try { await audio.play(); } catch (e) {}
        return loadRequestData;
      } catch (e) {
        throw e;
      }
    }
  );

  setInterval(sendTelemetry, 500);

  context.start();
</script>
</body>
</html>
