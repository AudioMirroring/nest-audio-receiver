<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.9.2-caf2/shaka-player.compiled.js"></script>
</head>
<body>
  <button id="btnPlay">Play</button>
  <audio id="audio_element" controls></audio>

  <script>
    const TEST = {
      enabled: true,
      url: 'http://192.168.0.65:8080/dash/index.mpd',
    };

    function log(...args) {
      console.log('[RX]', ...args);
    }
    function logAndSend(tag, payload) {
      log(tag, payload);
    }
    const nowMs = () => (performance ? performance.now() : Date.now());

    function getBufferedEnd(mediaEl) {
      try {
        if (!mediaEl || !mediaEl.buffered || mediaEl.buffered.length === 0) return null;
        return mediaEl.buffered.end(mediaEl.buffered.length - 1);
      } catch (_) { return null; }
    }

    (async () => {
      const audio = document.getElementById('audio_element');

	  if (window.shaka && shaka.log && shaka.log.setLevel && shaka.log.Level) {
	    shaka.log.setLevel(shaka.log.Level.DEBUG);
		console.log('[RX] shaka.log DEBUG enabled');
	  } else {
	    console.log('[RX] shaka.log not available (ok)');
	  }
	  
	  console.log('[RX] shaka exists?', !!window.shaka, 'version:', window.shaka?.Player?.version);

      // v5 대비: attach 방식
      const player = new shaka.Player();
      await player.attach(audio);

      player.addEventListener('error', (e) => {
        const d = e && e.detail ? e.detail : {};
        logAndSend('player.error', { code: d.code, data: d.data, message: d.message, stack: d.stack });
      });
      player.addEventListener('buffering', (e) => logAndSend('player.buffering', { buffering: e.buffering }));
      player.addEventListener('loading', () => logAndSend('player.loading', {}));
      player.addEventListener('trackschanged', () => logAndSend('player.trackschanged', {}));
      player.addEventListener('adaptation', () => logAndSend('player.adaptation', {}));

      // ✅ 일단 타입 에러 나는 liveSync 제거해서 깔끔하게 확인
      player.configure({
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 1.0,
          rebufferingGoal: 0.5,
        },
        manifest: {
          dash: {
            autoCorrectDrift: true,
            ignoreSuggestedPresentationDelay: true,
            ignoreMinBufferTime: true,
          }
        }
      });

      // TEST load
      const start = nowMs();
      logAndSend('TEST.begin', { url: TEST.url });

      await player.load(TEST.url);
      logAndSend('player.load.ok(TEST)', { elapsedMs: Math.round(nowMs() - start) });

      // 사용자 클릭으로 재생(autoplay 정책 회피)
      document.getElementById('btnPlay').addEventListener('click', async () => {
        try {
          await audio.play();
          logAndSend('audio.play.ok(user)', {});
        } catch (e) {
          logAndSend('audio.play.fail(user)', { err: String(e) });
        }
      });

      // STATS
      setInterval(() => {
        try {
          const s = player.getStats();
          const ct = audio.currentTime;
          const be = getBufferedEnd(audio);
          const bufAhead = (be != null && ct != null) ? (be - ct) : null;

          logAndSend('STATS', {
            currentTime: ct,
            bufferedEnd: be,
            bufferAheadSec: bufAhead,
            readyState: audio.readyState,
            liveLatencyShaka: s.liveLatency,
            estimatedBandwidth: s.estimatedBandwidth,
            bufferingTime: s.bufferingTime,
          });
        } catch (e) {
          logAndSend('STATS.failed', { err: String(e) });
        }
      }, 1000);

    })();
  </script>
</body>
</html>
