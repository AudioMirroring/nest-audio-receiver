<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.9.2-caf2/shaka-player.compiled.js"></script>
  <style>
    body { margin: 0; background: #111; color: #eee; font-family: sans-serif; }
    #overlay { position: fixed; left: 0; top: 0; right: 0; padding: 8px 10px; background: rgba(0,0,0,.6); font-size: 12px; }
    #audio_element { width: 100%; }
  </style>
</head>

<body>
  <div id="overlay">RX booting...</div>
  <audio id="audio_element" controls></audio>

  <script>
    const overlay = document.getElementById('overlay');
    const audio = document.getElementById('audio_element');

    function log(...args) {
      console.log('[RX]', ...args);
      overlay.textContent = args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
    }

    if (!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()) throw new Error('Shaka not supported');
    if (shaka.polyfill && shaka.polyfill.installAll) shaka.polyfill.installAll();

    const player = new shaka.Player();
    player.attach(audio);

    // ====== 1순위 목표: 일정한 지연(Fixed Latency) 강제 ======
    const TARGET_LATENCY_SEC = 4.0; // 체감 지연 4초로 고정
    const BUFFERING_GOAL_SEC = 3.0; // 스피커가 정확히 3초 분량의 데이터를 수신하면 재생 시작

    player.configure({
      streaming: {
        lowLatencyMode: false, // 불안정한 최신 청크 요청 중단 (안정성 최우선)
        jumpLargeGaps: true,

        // 정확히 3초 분량이 차야만 시작 (요청하신 목표)
        bufferingGoal: BUFFERING_GOAL_SEC,
        rebufferingGoal: BUFFERING_GOAL_SEC,
        bufferBehind: 2.0, 

        liveSync: {
          enabled: true,
          targetLatency: TARGET_LATENCY_SEC,
          targetLatencyTolerance: 0.2, // 4초에서 조금이라도 벗어나면 즉각 복귀
          maxPlaybackRate: 1.15,       
          minPlaybackRate: 0.95,
          panicMode: true,
          panicThreshold: 1.5          
        },

        retryParameters: {
          timeout: 10000,
          maxAttempts: 6,
          baseDelay: 300,
          backoffFactor: 2,
          fuzzFactor: 0.5
        }
      },

      manifest: {
        dash: {
          autoCorrectDrift: true,
          enableFastSwitching: true,
          ignoreSuggestedPresentationDelay: false, // MPD를 무시하지 않고
          defaultPresentationDelay: TARGET_LATENCY_SEC // 무조건 Live Edge 기준 -4.0초 지점부터 시작하도록 강제
        }
      }
    });

    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      async (loadRequestData) => {
        try {
          const url = loadRequestData?.media?.contentId;
          log('LOAD', url);
          await player.load(url);
          log('load.ok');
          try { await audio.play(); } catch (e) {}
          return loadRequestData;
        } catch (e) { throw e; }
      }
    );

    setInterval(() => {
      try {
        const s = player.getStats();
        const ct = audio.currentTime;
        const be = (audio.buffered && audio.buffered.length) ? audio.buffered.end(audio.buffered.length - 1) : null;
        const bufAhead = (be != null && ct != null) ? (be - ct) : null;
        log(`LiveLat: ${s.liveLatency?.toFixed(2)}s | Buf: ${bufAhead?.toFixed(2)}s`);
      } catch (e) {}
    }, 1000);

    context.start();
  </script>
</body>
</html>
