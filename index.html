<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script
    src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.9.2-caf2/shaka-player.compiled.js"
    onload="console.log('[RX] shaka script loaded')"
    onerror="console.error('[RX] shaka script FAILED to load')">
  </script>
</head>

<body>
  <button id="btnPlay">Play</button>
  <audio id="audio_element" controls></audio>

  <script>
    const TEST = {
      enabled: true,
      url: 'http://192.168.0.65:8080/dash/index.mpd',
    };

    function log(...args) { console.log('[RX]', ...args); }
    function logAndSend(tag, payload) { log(tag, payload); }

    const nowMs = () => (typeof performance !== 'undefined' ? performance.now() : Date.now());

    function getBufferedEnd(mediaEl) {
      try {
        if (!mediaEl ||
            !mediaEl.buffered || mediaEl.buffered.length === 0) return null;
        return mediaEl.buffered.end(mediaEl.buffered.length - 1);
      } catch (_) { return null; }
    }

    (async () => {
      const audio = document.getElementById('audio_element');

      // Shaka loaded?
      log('shaka exists?', !!window.shaka, 'version:', window.shaka?.Player?.version);

      // shaka.log may not exist in caf2 build; safe-guard
      if (window.shaka && shaka.log && shaka.log.setLevel && shaka.log.Level) {
        shaka.log.setLevel(shaka.log.Level.DEBUG);
        log('shaka.log DEBUG enabled');
      } else {
        log('shaka.log not available (ok)');
      }

      // ===== Player 생성(값/로직 최소 변경 + attach 호환) =====
      let player = null;
      try {
        player = new shaka.Player();
        if (player.attach) {
          await player.attach(audio);
        } else {
          throw new Error('player.attach is not available');
        }
      } catch (e) {
        logAndSend('player.attach.fallback', { err: String(e) });
        player = new shaka.Player(audio);
      }

      // Events
      player.addEventListener('error', (e) => {
        const d = e?.detail ?? {};
        logAndSend('player.error', {
          code: d.code,
          severity: d.severity,
          category: d.category,
          data: d.data,
          message: d.message,
          stack: d.stack,
        });
      });
      player.addEventListener('buffering', (e) => logAndSend('player.buffering', { buffering: e.buffering }));
      player.addEventListener('loading', () => logAndSend('player.loading', {}));
      player.addEventListener('trackschanged', () => logAndSend('player.trackschanged', {}));
      player.addEventListener('adaptation', () => logAndSend('player.adaptation', {}));

      // ===== 2초 타깃 핵심 설정 =====
      player.configure({
        streaming: {
          lowLatencyMode: true,
          jumpLargeGaps: true,

          // 2초 근처로 붙이기
          liveSync: {
            enabled: true,
            targetLatency: 4.0,
            targetLatencyTolerance: 0.25,
            maxPlaybackRate: 1.12,
            minPlaybackRate: 0.95,
            panicMode: true,
            panicThreshold: 1.0,
          },

          // 2초 목표에서는 버퍼도 공격적으로
          bufferingGoal: 4.0,
		  rebufferingGoal: 4.0,
        },

        manifest: {
          dash: {
            autoCorrectDrift: true,
            enableFastSwitching: true,
            ignoreSuggestedPresentationDelay: true,
            ignoreMinBufferTime: true,
          }
        }
      });

      // Load
      const start = nowMs();
      logAndSend('TEST.begin', { url: TEST.url });

      await player.load(TEST.url);
      logAndSend('player.load.ok(TEST)', { elapsedMs: Math.round(nowMs() - start) });

      // 설정이 실제 적용됐는지 확인 (필수)
      try {
        log('[RX] NON-DEFAULT CONFIG', player.getNonDefaultConfiguration());
        log('[RX] LIVE SYNC', player.getConfiguration().streaming.liveSync);
      } catch (e) {
        logAndSend('getConfiguration.failed', { err: String(e) });
      }

      // ===== 자동 재생 시도 (기존 버튼 방식 유지 + 자동시도만 추가) =====
      try {
        await audio.play();
        logAndSend('audio.play.ok(auto)', {});
      } catch (e) {
        logAndSend('audio.play.fail(auto)', { err: String(e) });
      }

      // Autoplay 정책 회피: 클릭으로 play (유지)
      document.getElementById('btnPlay').addEventListener('click', async () => {
        try {
          await audio.play();
          logAndSend('audio.play.ok(user)', {});
        } catch (e) {
          logAndSend('audio.play.fail(user)', { err: String(e) });
        }
      });

      // Stats
      setInterval(() => {
        try {
          const s = player.getStats();
          const ct = audio.currentTime;
          const be = getBufferedEnd(audio);
          const bufAhead = (be != null && ct != null) ? (be - ct) : null;

          logAndSend('STATS', {
            currentTime: ct,
            bufferedEnd: be,
            bufferAheadSec: bufAhead,
            readyState: audio.readyState,

            liveLatencyShaka: s.liveLatency,
            estimatedBandwidth: s.estimatedBandwidth,
            bufferingTime: s.bufferingTime,
            playTime: s.playTime,
          });
        } catch (e) {
          logAndSend('STATS.failed', { err: String(e) });
        }
      }, 1000);
    })();
  </script>
</body>
</html>
